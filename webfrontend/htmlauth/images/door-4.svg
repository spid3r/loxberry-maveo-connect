<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — closed">
  <defs>
    <linearGradient id="bgClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panelClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="0.5" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="frameMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadowClosed" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgClosed)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#1e293b" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#0b1220" stroke-width="2"/>
  <g filter="url(#shadowClosed)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetal)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#panelClosed)"/>
    <g stroke="#475569" stroke-width="1.4">
      <line x1="68" y1="65"  x2="252" y2="65"/>
      <line x1="68" y1="90"  x2="252" y2="90"/>
      <line x1="68" y1="115" x2="252" y2="115"/>
      <line x1="68" y1="140" x2="252" y2="140"/>
    </g>
    <rect x="150" y="146" width="20" height="6" rx="1.5" fill="#1e293b"/>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Closed</text>
</svg>
