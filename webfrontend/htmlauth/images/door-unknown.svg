<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — unknown state">
  <defs>
    <linearGradient id="bgUnknown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="frameMetalUnknown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panelUnknown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadowUnknown" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgUnknown)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#0f172a" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#020617" stroke-width="2"/>
  <g filter="url(#shadowUnknown)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalUnknown)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#panelUnknown)" stroke="#64748b" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="160" y="118" text-anchor="middle" fill="#cbd5e1" font-family="system-ui,sans-serif" font-size="56" font-weight="700">?</text>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Unknown</text>
</svg>
