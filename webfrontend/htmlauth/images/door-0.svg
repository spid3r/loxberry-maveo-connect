<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — stopped">
  <defs>
    <linearGradient id="bgStopped" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1306"/>
      <stop offset="1" stop-color="#1a0f04"/>
    </linearGradient>
    <linearGradient id="frameMetalStopped" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="interiorStopped" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d130a"/>
      <stop offset="1" stop-color="#1a0f04"/>
    </linearGradient>
    <linearGradient id="panelStopped" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#92400e"/>
    </linearGradient>
    <filter id="shadowStopped" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgStopped)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#231509" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#0d0703" stroke-width="2"/>
  <g filter="url(#shadowStopped)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalStopped)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interiorStopped)"/>
    <rect x="68" y="40" width="184" height="62" rx="3" fill="url(#panelStopped)"/>
    <g stroke="#78350f" stroke-width="1.2" opacity="0.7">
      <line x1="68" y1="58" x2="252" y2="58"/>
      <line x1="68" y1="76" x2="252" y2="76"/>
      <line x1="68" y1="94" x2="252" y2="94"/>
    </g>
  </g>
  <g transform="translate(160 134)" opacity="0.95">
    <rect x="-19" y="-13" width="38" height="26" rx="4" fill="#7c2d12" stroke="#fbbf24" stroke-width="1.5"/>
    <rect x="-12" y="-7"  width="6"  height="14" rx="1" fill="#fde68a"/>
    <rect x="6"   y="-7"  width="6"  height="14" rx="1" fill="#fde68a"/>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#fcd34d" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Stopped</text>
</svg>
