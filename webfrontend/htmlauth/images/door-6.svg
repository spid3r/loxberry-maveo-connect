<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — intermediate (closed side)">
  <defs>
    <linearGradient id="bgInterClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#1a1740"/>
    </linearGradient>
    <linearGradient id="frameMetalInterClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="interiorInterClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f0d2e"/>
    </linearGradient>
    <linearGradient id="panelInterClosed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7d2fe"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="shadowInterClosed" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgInterClosed)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#0d0a2c" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#040215" stroke-width="2"/>
  <g filter="url(#shadowInterClosed)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalInterClosed)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interiorInterClosed)"/>
    <rect x="68" y="40" width="184" height="108" rx="3" fill="url(#panelInterClosed)"/>
    <g stroke="#3730a3" stroke-width="1.2" opacity="0.75">
      <line x1="68" y1="58"  x2="252" y2="58"/>
      <line x1="68" y1="76"  x2="252" y2="76"/>
      <line x1="68" y1="94"  x2="252" y2="94"/>
      <line x1="68" y1="112" x2="252" y2="112"/>
      <line x1="68" y1="130" x2="252" y2="130"/>
    </g>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Intermediate (closed)</text>
</svg>
