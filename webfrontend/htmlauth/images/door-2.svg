<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — closing">
  <defs>
    <linearGradient id="bgClosing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b1408"/>
      <stop offset="1" stop-color="#2a0c05"/>
    </linearGradient>
    <linearGradient id="frameMetalClosing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b91c1c"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="interiorClosing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f0d0a"/>
      <stop offset="1" stop-color="#240b07"/>
    </linearGradient>
    <linearGradient id="panelClosing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fecaca"/>
      <stop offset="0.5" stop-color="#f87171"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="shadowClosing" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgClosing)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#231007" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#0c0402" stroke-width="2"/>
  <g filter="url(#shadowClosing)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalClosing)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interiorClosing)"/>
    <rect x="68" y="40" width="184" height="86" rx="3" fill="url(#panelClosing)"/>
    <g stroke="#7f1d1d" stroke-width="1.2" opacity="0.75">
      <line x1="68" y1="58"  x2="252" y2="58"/>
      <line x1="68" y1="76"  x2="252" y2="76"/>
      <line x1="68" y1="94"  x2="252" y2="94"/>
      <line x1="68" y1="112" x2="252" y2="112"/>
    </g>
  </g>
  <g transform="translate(160 144)" opacity="0.92">
    <circle r="16" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1.5"/>
    <path d="M0 -6 L0 7 M-6 1 L0 7 L6 1" stroke="#fee2e2" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Closing…</text>
</svg>
