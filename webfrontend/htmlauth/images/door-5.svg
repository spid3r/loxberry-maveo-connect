<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — intermediate (open side)">
  <defs>
    <linearGradient id="bgInterOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#03242a"/>
      <stop offset="1" stop-color="#031a1f"/>
    </linearGradient>
    <linearGradient id="frameMetalInterOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="interiorInterOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#062029"/>
      <stop offset="1" stop-color="#03161c"/>
    </linearGradient>
    <linearGradient id="panelInterOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadowInterOpen" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgInterOpen)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#03161c" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#000a0f" stroke-width="2"/>
  <g filter="url(#shadowInterOpen)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalInterOpen)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interiorInterOpen)"/>
    <rect x="68" y="40" width="184" height="48" rx="3" fill="url(#panelInterOpen)"/>
    <g stroke="#0f766e" stroke-width="1.2" opacity="0.75">
      <line x1="68" y1="56" x2="252" y2="56"/>
      <line x1="68" y1="72" x2="252" y2="72"/>
    </g>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#5eead4" font-family="system-ui,sans-serif" font-size="12" font-weight="600">Intermediate (open)</text>
</svg>
