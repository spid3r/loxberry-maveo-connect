<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — open">
  <defs>
    <linearGradient id="bgOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#052e1c"/>
      <stop offset="1" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="frameMetalOpen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f6f4a"/>
      <stop offset="1" stop-color="#0b3a26"/>
    </linearGradient>
    <linearGradient id="interior" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#031e14"/>
      <stop offset="1" stop-color="#0a1e15"/>
    </linearGradient>
    <linearGradient id="panelStack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="0.6" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadowOpen" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgOpen)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#0a1f17" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#02100b" stroke-width="2"/>
  <g filter="url(#shadowOpen)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalOpen)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interior)"/>
    <rect x="68" y="40" width="184" height="34" rx="3" fill="url(#panelStack)"/>
    <g stroke="#166534" stroke-width="1" opacity="0.7">
      <line x1="68" y1="48" x2="252" y2="48"/>
      <line x1="68" y1="58" x2="252" y2="58"/>
      <line x1="68" y1="68" x2="252" y2="68"/>
    </g>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#86efac" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Open</text>
</svg>
