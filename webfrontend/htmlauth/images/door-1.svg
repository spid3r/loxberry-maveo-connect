<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="Garage door — opening">
  <defs>
    <linearGradient id="bgOpening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c2a3d"/>
      <stop offset="1" stop-color="#082234"/>
    </linearGradient>
    <linearGradient id="frameMetalOpening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="interiorOpening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1224"/>
      <stop offset="1" stop-color="#0a1e36"/>
    </linearGradient>
    <linearGradient id="panelOpening" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfdbfe"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadowOpening" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="320" height="200" rx="14" fill="url(#bgOpening)"/>
  <line x1="20" y1="170" x2="300" y2="170" stroke="#0b2336" stroke-width="2"/>
  <line x1="20" y1="172" x2="300" y2="172" stroke="#03101e" stroke-width="2"/>
  <g filter="url(#shadowOpening)">
    <rect x="60" y="32" width="200" height="138" rx="6" fill="url(#frameMetalOpening)"/>
    <rect x="68" y="40" width="184" height="124" rx="3" fill="url(#interiorOpening)"/>
    <rect x="68" y="40" width="184" height="68" rx="3" fill="url(#panelOpening)"/>
    <g stroke="#1e40af" stroke-width="1.2" opacity="0.75">
      <line x1="68" y1="56" x2="252" y2="56"/>
      <line x1="68" y1="72" x2="252" y2="72"/>
      <line x1="68" y1="88" x2="252" y2="88"/>
      <line x1="68" y1="104" x2="252" y2="104"/>
    </g>
  </g>
  <g transform="translate(160 138)" opacity="0.92">
    <circle r="16" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <path d="M0 6 L0 -7 M-6 -1 L0 -7 L6 -1" stroke="#dbeafe" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="160" y="190" text-anchor="middle" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Opening…</text>
</svg>
