[AUTHOR]
NAME=Thorsten Wolf
EMAIL=thorsten.wolf@users.noreply.github.com

[PLUGIN]
VERSION=1.0.1-beta.5
NAME=maveoconnect
FOLDER=maveoconnect
TITLE=Maveo Connect

[SYSTEM]
INTERFACE=2.0
REBOOT=false
LB_MINIMUM=3.0
LB_MAXIMUM=false
ARCHITECTURE="raspberry,x86"
CUSTOM_LOGLEVELS=true
