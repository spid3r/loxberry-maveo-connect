# Embedded admin header thumb: `webfrontend/htmlauth/icon_64.png` (no label)
ICON=icon_64.png

[AUTOUPDATE]
AUTOMATIC_UPDATES=true
RELEASECFG=https://raw.githubusercontent.com/spid3r/loxberry-maveo-connect/main/release.cfg
# Beta channel pointers live on branch `beta` (updated by the beta-release workflow).
PRERELEASECFG=https://raw.githubusercontent.com/spid3r/loxberry-maveo-connect/beta/prerelease.cfg

[DAEMON]
ENABLED=true