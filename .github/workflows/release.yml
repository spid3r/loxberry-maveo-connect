# Runs semantic-release on main only: version bump, CHANGELOG, Git tag, GitHub Release + ZIP.
#
# - main → stable semver (release.cfg; GitHub Release, not prerelease).
# - beta → see workflow `beta-release.yml` (explicit `{stable}-beta.N`, not semantic-release).
#
# No PAT required: the default GITHUB_TOKEN has enough scope when job permissions
# are set to contents: write (see below). Do not set a restrictive workflow-level
# "permissions: contents: read" — it can block release creation.
name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: semantic-release-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Checkout maveo-connect-stick-client (sources for npm link step)
        uses: actions/checkout@v6
        with:
          repository: spid3r/maveo-connect-stick-client
          path: maveo-connect-stick-client

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: "0"

      - name: Typecheck and unit tests (no LoxBerry)
        run: npm run typecheck && npm test

      - name: Semantic release (build + ZIP in prepare; Git tags + GitHub Release; no npm publish)
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
