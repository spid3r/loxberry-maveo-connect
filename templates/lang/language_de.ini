LOXONE_HELP_TITLE="Loxone anbinden (Tor & Licht)"
LOXONE_HELP_INTRO="Es gibt zwei sinnvolle Wege ins Smart-Home — du brauchst nicht beides gleichzeitig:"
LOXONE_HELP_B1="Status & Steuerung (Registerkarte in diesem Plugin): Position und Licht kommen direkt vom LoxBerry-Daemon und werden in kurzen Abständen aktualisiert. Das ist der direkteste Weg am Bildschirm."
LOXONE_HELP_B2="MQTT-Weiterleitung (unten unter „Erweiterte Einstellungen“): Der Daemon schreibt nur drei Topics unter deinem Präfix: `…/door_position`, `…/door_label`, `…/light_on` (kein kombiniertes JSON-Topic — das LoxBerry-MQTT-Gateway würde es sonst doppelt mit merkwürdigen `##`-Namen ausklappen). Technisch verbindet er sich dafür auf diesem Gerät mit mqtt://127.0.0.1:1883 — das ist nur der Mosquitto **auf dem LoxBerry**. Loxone sieht diese Topics nur, wenn dein MQTT-Gateway / -Connector sich mit **demselben** Broker verbindet: Host = **IP-Adresse dieses LoxBerry** (oder DNS-Name im LAN), Port 1883 — nicht die Loxone-Cloud und nicht 127.0.0.1 vom Miniserver aus (das wäre ein anderer Rechner)."
LOXONE_HELP_B3="Tor von Loxone aus öffnen oder schließen: Dieses Plugin nimmt keine MQTT-Befehle von Loxone entgegen — Steuerung über die Status-Seite des Plugins, die Maveo-App oder deine vorhandenen Tor-Aktoren in Loxone."
LOXONE_HELP_LATENCY="Echtzeit vs. Verzögerung: Zwischen Stick, Maveo-Cloud und LoxBerry liegt bereits eine kleine Laufzeit. Wenn Loxone als MQTT-Abonnent eingeschaltet ist, kommen Broker-Last, Netzwerk und interne Loxone-Intervalle hinzu — es kann also spürbar „hinterherhinken“ gegenüber der Plugin-Statusseite. Die aktuellsten Werte siehst du im Tab „Status & Steuerung“; für Diagnose hilft das Daemon-Log mit Level „debug“."
LOXONE_HELP_MQTT_AUTH="Steht im Daemon-Log „Not authorized“ oder ähnliche Verbindungsfehler zur MQTT-Weiterleitung, ist **keine** Verbindung zum Broker möglich — dann werden auch **keine** Topics unter maveo/# geschrieben. Dann MQTT-Benutzer/Passwort in den erweiterten Einstellungen prüfen (oder in Mosquitto anonymen Zugriff erlauben). Erst wenn im Log „MQTT forward: connected“ erscheint, kann Loxone eingehende Nachrichten sehen — und nur bei Tor- oder Lichtänderungen (kein Dauer-Ticker)."
