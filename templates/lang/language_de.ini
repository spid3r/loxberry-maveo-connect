[OVERVIEW]
LEAD="Maveo Connect bindet ein Marantec-Garagentor über den Maveo Connect Stick und die offizielle Marantec-Cloud (AWS Cognito + IoT MQTT) an LoxBerry an. Werte können optional per MQTT an Loxone weitergereicht werden."
HOWTO_TITLE="In wenigen Schritten einsatzbereit"
HOWTO_STEP1="Reiter „Einstellungen“: E‑Mail und Passwort des Maveo‑Kontos eingeben, „Anmeldung prüfen“ — bei Erfolg erscheint die Liste der Sticks."
HOWTO_STEP2="Stick (Thing) auswählen und speichern. Der Daemon verbindet sich automatisch."
HOWTO_STEP3="Reiter „Status & Steuerung“: Tor-Position und Licht ablesen, optional Tor öffnen/schließen oder Licht schalten."
HOWTO_STEP4="Bei Problemen: Reiter „Protokoll“ — die letzten Meldungen helfen bei der Fehlersuche."
