HOWTO_STEP1="Tab “Settings”: enter your Maveo account email and password, click “Test login” — on success the list of sticks appears."
HOWTO_STEP2="Pick a stick (thing) and save. The daemon connects automatically."
HOWTO_STEP3="Tab “Status & control”: see door position and light, optionally open/close the door or toggle the light."
HOWTO_STEP4="Trouble? Tab “Log” — recent messages help when diagnosing problems."
